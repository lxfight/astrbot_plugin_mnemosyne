<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnemosyne 管理面板</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h1><i class="ti ti-brain"></i> Mnemosyne</h1>
                <p class="subtitle">记忆管理系统</p>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="ti ti-dashboard icon"></i>
                    <span>系统监控</span>
                </a>
                <a href="#" class="nav-item" data-page="memories">
                    <i class="ti ti-bulb icon"></i>
                    <span>记忆管理</span>
                </a>
                <a href="#" class="nav-item" data-page="sessions">
                    <i class="ti ti-users icon"></i>
                    <span>会话列表</span>
                </a>
                <a href="#" class="nav-item" data-page="statistics">
                    <i class="ti ti-chart-bar icon"></i>
                    <span>统计分析</span>
                </a>
                <a href="#" class="nav-item" data-page="config">
                    <i class="ti ti-settings icon"></i>
                    <span>系统配置</span>
                </a>
            </nav>
            <div class="theme-toggle">
                <button id="theme-toggle-btn" class="theme-toggle-btn">
                    <i class="ti ti-moon"></i>
                    <span>深色模式</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div id="page-container">
                <!-- 系统监控页面 -->
                <div id="dashboard-page" class="page active">
                    <div class="page-header">
                        <h2>系统监控仪表板</h2>
                        <button class="btn btn-primary" onclick="refreshDashboard()">
                            <i class="ti ti-refresh"></i> 刷新
                        </button>
                    </div>
                    <div class="status-cards">
                        <div class="status-card" id="overall-status">
                            <div class="card-icon"><i class="ti ti-circle-check"></i></div>
                            <div class="card-content">
                                <h3>系统状态</h3>
                                <p class="status-text">加载中...</p>
                            </div>
                        </div>
                        <div class="status-card">
                            <div class="card-icon"><i class="ti ti-database"></i></div>
                            <div class="card-content">
                                <h3>记忆总数</h3>
                                <p class="status-value" id="total-memories">-</p>
                            </div>
                        </div>
                        <div class="status-card">
                            <div class="card-icon"><i class="ti ti-users"></i></div>
                            <div class="card-content">
                                <h3>活跃会话</h3>
                                <p class="status-value" id="active-sessions">-</p>
                            </div>
                        </div>
                        <div class="status-card">
                            <div class="card-icon"><i class="ti ti-cpu"></i></div>
                            <div class="card-content">
                                <h3>内存使用</h3>
                                <p class="status-value" id="memory-usage">-</p>
                            </div>
                        </div>
                    </div>
                    <div class="section">
                        <h3>组件健康状态</h3>
                        <div id="components-health" class="components-grid"></div>
                    </div>
                    <div class="section">
                        <h3>性能指标</h3>
                        <div id="performance-metrics" class="metrics-grid"></div>
                    </div>
                </div>

                <!-- 记忆管理页面 -->
                <div id="memories-page" class="page">
                    <div class="page-header">
                        <h2>记忆管理</h2>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="loadAllMemories()">
                                <i class="ti ti-refresh"></i> 刷新
                            </button>
                            <button class="btn" onclick="exportMemories()">
                                <i class="ti ti-download"></i> 导出
                            </button>
                        </div>
                    </div>
                    <div class="filters-container">
                        <div class="filters-grid">
                            <div class="filter-group">
                                <label>关键词搜索</label>
                                <input type="text" id="search-keyword" placeholder="输入关键词..." class="input">
                            </div>
                            <div class="filter-group">
                                <label>会话ID</label>
                                <input type="text" id="search-session-id" placeholder="会话ID（可选）" class="input">
                            </div>
                            <div class="filter-group">
                                <label>人格ID</label>
                                <input type="text" id="search-persona-id" placeholder="人格ID（可选）" class="input">
                            </div>
                            <div class="filter-group">
                                <label>分组方式</label>
                                <select id="search-group-by" class="input" onchange="applyGrouping()">
                                    <option value="">不分组</option>
                                    <option value="session">按会话分组</option>
                                    <option value="persona">按人格分组</option>
                                    <option value="date">按日期分组</option>
                                </select>
                            </div>
                        </div>
                        <div class="filter-actions">
                            <button class="btn btn-primary" onclick="searchMemories()">
                                <i class="ti ti-search"></i> 关键词搜索
                            </button>
                            <button class="btn btn-success" onclick="vectorSearchMemories()">
                                <i class="ti ti-topology-star"></i> 向量检索
                            </button>
                            <button class="btn" onclick="clearFilters()">
                                <i class="ti ti-x"></i> 清除筛选
                            </button>
                        </div>
                    </div>
                    <div class="info-bar">
                        <span id="memories-count-info">共 0 条记忆</span>
                        <span id="memories-filter-info"></span>
                    </div>
                    <div id="memories-list" class="list-container">
                        <div class="loading-placeholder">
                            <i class="ti ti-loader"></i>
                            <p>正在加载记忆...</p>
                        </div>
                    </div>
                    <div id="memories-pagination" class="pagination"></div>
                </div>

                <!-- 会话列表页面 -->
                <div id="sessions-page" class="page">
                    <div class="page-header">
                        <h2>会话列表</h2>
                        <button class="btn btn-primary" onclick="loadSessions()">
                            <i class="ti ti-refresh"></i> 刷新
                        </button>
                    </div>
                    <div id="sessions-list" class="list-container">
                        <p class="placeholder">加载中...</p>
                    </div>
                </div>

                <!-- 统计分析页面 -->
                <div id="statistics-page" class="page">
                    <div class="page-header">
                        <h2>统计分析</h2>
                        <button class="btn btn-primary" onclick="loadStatistics()">
                            <i class="ti ti-refresh"></i> 刷新
                        </button>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h4 style="color: var(--primary-color);">总记忆数</h4>
                            <div class="stat-value" id="stat-total-memories">-</div>
                            <div class="stat-label">所有记忆总数</div>
                        </div>
                        <div class="stat-card">
                            <h4 style="color: var(--secondary-color);">活跃会话</h4>
                            <div class="stat-value" id="stat-active-sessions">-</div>
                            <div class="stat-label">当前活跃会话数</div>
                        </div>
                        <div class="stat-card">
                            <h4 style="color: var(--info-color);">今日新增</h4>
                            <div class="stat-value" id="stat-today-added">-</div>
                            <div class="stat-label">今天新增的记忆</div>
                        </div>
                        <div class="stat-card">
                            <h4 style="color: var(--success-color);">平均记忆数</h4>
                            <div class="stat-value" id="stat-avg-per-session">-</div>
                            <div class="stat-label">每会话平均记忆数</div>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h3>每日记忆趋势</h3>
                        <div class="chart-wrapper">
                            <canvas id="statistics-chart"></canvas>
                        </div>
                    </div>
                    <div class="section">
                        <h3>最活跃的会话 (Top 10)</h3>
                        <div id="top-sessions-list" class="list-container">
                            <p class="placeholder">加载中...</p>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h3>记忆分布统计</h3>
                        <div class="chart-wrapper">
                            <canvas id="distribution-chart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 系统配置页面 -->
                <div id="config-page" class="page">
                    <div class="page-header">
                        <div>
                            <h2>系统配置</h2>
                            <p class="page-subtitle">当前插件运行配置（只读）</p>
                        </div>
                        <button class="btn btn-primary" onclick="loadConfig()">
                            <i class="ti ti-refresh"></i> 刷新
                        </button>
                    </div>
                    <div id="config-content"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p><i class="ti ti-loader"></i> 加载中...</p>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script type="module" src="./app.js"></script>
</body>
</html>
